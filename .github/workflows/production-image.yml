name: Production Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build and publish image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      version: ${{ steps.version.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Resolve image name
        id: image
        run: |
          IMAGE_REPO=$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "image=${REGISTRY}/${IMAGE_REPO}" >> "$GITHUB_OUTPUT"

      - name: Write build version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short=8 HEAD)
          VERSION="main-${SHORT_SHA}"
          echo "${VERSION}" > VERSION
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building ${VERSION} from ${GITHUB_SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:main
            ${{ steps.image.outputs.image }}:sha-${{ github.sha }}
            ${{ steps.image.outputs.image }}:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=new-api
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Image summary
        run: |
          {
            echo "### Production image"
            echo
            echo '```text'
            echo "image=${{ steps.image.outputs.image }}"
            echo "version=${{ steps.version.outputs.version }}"
            echo "digest=${{ steps.build.outputs.digest }}"
            echo "tags=main, sha-${{ github.sha }}, ${{ steps.version.outputs.version }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
